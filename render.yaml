# Render Blueprint — ForteL2 L2 verifier (stock op-geth + op-node).
# Private by default (JSON-RPC not on the public internet).
# Dashboard: New → Blueprint → this repo. Set L1_RPC_URL secret.
#
# Or: New → Private Service → Runtime Docker → root Dockerfile.
# Attach a persistent disk at /data (≥20 GB).

services:
  - type: pserv
    name: fortel2-replica
    runtime: docker
    plan: standard
    dockerfilePath: ./Dockerfile
    dockerContext: .
    region: oregon
    disk:
      name: fortel2-replica-data
      mountPath: /data
      sizeGB: 20
    envVars:
      - key: L1_RPC_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: L1_BLOCK_TIME
        value: "12"
      - key: GETH_CACHE_MB
        value: "256"
      # Soft self-throttle on metered Sepolia RPC (QuickNode credits)
      - key: L1_HTTP_POLL_INTERVAL
        value: "12s"
      - key: L1_RPC_RATE_LIMIT
        value: "20"
